# ===========================================
# Arc'teryx 商品监控系统 - Docker Compose
# 作者：linshibo
# ===========================================
# 使用方法:
#   默认（推荐，单容器）: docker compose up -d --build
#   兼容旧模式（四容器）: docker compose --profile legacy-workers up -d --build
#   查看日志:   docker compose logs -f
#   查看特定服务日志: docker compose logs -f rakuten-monitor
#   停止服务:   docker compose down
#   执行检测:   docker compose exec monitor python -m backend.app.services.monitor --once
#   库存检查:   docker compose exec inventory-monitor python -m backend.scripts.run_inventory_monitor --once
#   乐天监控状态: docker compose exec rakuten-monitor cat /app/data/rakuten_state.json

services:
  monitor:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arcteryx-monitor
    restart: unless-stopped
    # 使用宿主机网络模式，确保生产环境网络稳定性
    # 本地开发请使用 http://localhost:7080 访问
    network_mode: "host"
    volumes:
      # 持久化数据库和日志
      - ./data:/app/data
      - ./logs:/app/logs
      # 配置文件（可选：如需在容器外修改配置）
      - ./config.yaml:/app/config.yaml
    environment:
      - TZ=Asia/Shanghai
      - PORT=7080
      # 单容器模式：由 API 进程内聚启动调度任务
      - AUTO_START_MONITOR_SCHEDULER=${AUTO_START_MONITOR_SCHEDULER:-true}
      - AUTO_START_INVENTORY_SCHEDULER=${AUTO_START_INVENTORY_SCHEDULER:-true}
      - INVENTORY_INTERVAL_MINUTES=${INVENTORY_INTERVAL_MINUTES:-5}
      - AUTO_START_RAKUTEN_MONITOR=${AUTO_START_RAKUTEN_MONITOR:-true}
      - RAKUTEN_INTERVAL_SECONDS=${RAKUTEN_INTERVAL_SECONDS:-300}
      - AUTO_START_RELEASE_MONITOR=${AUTO_START_RELEASE_MONITOR:-true}
      - RELEASE_MONITOR_INTERVAL_SECONDS=${RELEASE_MONITOR_INTERVAL_SECONDS:-300}
      # 默认强制 headless，减少 Xvfb 依赖与内存占用
      - PLAYWRIGHT_FORCE_HEADLESS=${PLAYWRIGHT_FORCE_HEADLESS:-true}
      # 代理服务器（用于绕过 Cloudflare 等访问限制）
      - PROXY_SERVER=${PROXY_SERVER:-}
    # 资源限制（4G 服务器建议值，可按需调整）
    mem_limit: 1600m
    mem_reservation: 768m
    pids_limit: 512
    stop_grace_period: 30s
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # ===== 兼容旧模式：以下服务默认不启动 =====
  # 启动方式：docker compose --profile legacy-workers up -d

  # 定时监控任务（每10分钟执行一次，兼容旧模式）
  monitor-scheduler:
    profiles: ["legacy-workers"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arcteryx-scheduler
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
    environment:
      - TZ=Asia/Shanghai
      - PLAYWRIGHT_FORCE_HEADLESS=true
    mem_limit: 768m
    mem_reservation: 384m
    pids_limit: 256
    # 启动守护进程模式
    command: ["python", "-m", "backend.app.services.monitor", "--daemon"]
    depends_on:
      monitor:
        condition: service_healthy

  # Arc'teryx 官网库存监控服务（兼容旧模式）
  inventory-monitor:
    profiles: ["legacy-workers"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: arcteryx-inventory-monitor
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
    environment:
      - TZ=Asia/Shanghai
      - DISPLAY=:99
      - PLAYWRIGHT_FORCE_HEADLESS=false
    mem_limit: 1024m
    mem_reservation: 512m
    pids_limit: 384
    # 使用 xvfb-run 运行以支持非 headless 浏览器
    # 每5分钟检查一次库存
    command: >
      bash -c "
        Xvfb :99 -screen 0 1920x1080x24 &
        sleep 2
        python -m backend.scripts.run_inventory_monitor --daemon --interval 5
      "
    depends_on:
      monitor:
        condition: service_healthy

  # 乐天商品监控服务（兼容旧模式）
  rakuten-monitor:
    profiles: ["legacy-workers"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rakuten-monitor
    restart: unless-stopped
    # 使用宿主机网络模式，解决 DNS 和网络问题
    network_mode: "host"
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config.yaml:/app/config.yaml
    environment:
      - TZ=Asia/Shanghai
      - PLAYWRIGHT_FORCE_HEADLESS=true
    mem_limit: 256m
    mem_reservation: 128m
    pids_limit: 128
      # 可选：通过环境变量覆盖邮件配置
      # - MONITOR_SENDER_EMAIL=your_email@qq.com
      # - MONITOR_SENDER_PASSWORD=your_password
      # - MONITOR_RECIPIENTS=receiver@example.com
    # 直接运行监控脚本（内置循环，默认5分钟检查一次）
    command: ["python", "-m", "backend.scripts.rakuten_monitor_task"]

networks:
  default:
    name: arcteryx-monitor-network
